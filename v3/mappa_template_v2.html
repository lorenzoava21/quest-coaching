<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Mappa del Personaggio - Quest Coaching v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400&display=swap');

  @page {
    size: A3 landscape;
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 420mm;
    height: 297mm;
    background: #FFFFFF;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 420mm;
    height: 297mm;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    height: 14mm;
    padding: 4mm 16mm 0 16mm;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .field {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 7pt;
    color: #B0AAA2;
  }

  .field .line {
    display: inline-block;
    width: 45mm;
    border-bottom: 0.5px solid #D0CBC3;
    margin-left: 2mm;
  }

  /* Grid */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    margin: 2mm 14mm 0 14mm;
  }

  .cell {
    padding: 7mm 10mm;
    position: relative;
    text-align: center;
  }

  /* Subtle borders between cells */
  .cell:nth-child(1),
  .cell:nth-child(2),
  .cell:nth-child(3) {
    border-bottom: 0.4px solid #E0DCD6;
  }

  .cell:nth-child(1),
  .cell:nth-child(4) {
    border-right: 0.4px solid #E0DCD6;
  }

  .cell:nth-child(2),
  .cell:nth-child(5) {
    border-right: 0.4px solid #E0DCD6;
  }

  .cell-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 15pt;
    color: #7A756F;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .cell-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 11.5pt;
    color: #A8A29C;
    margin-top: 1.5mm;
  }

  /* Subtle decorative element under each label group */
  .cell-ornament {
    margin-top: 3mm;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2.5mm;
  }

  .cell-ornament .dash {
    width: 10mm;
    height: 0;
    border-top: 0.3px solid #D8D3CC;
  }

  .cell-ornament svg {
    width: 4mm;
    height: 4mm;
    flex-shrink: 0;
  }

  /* Row labels */
  .row-label {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 8pt;
    color: #C8C2BA;
    letter-spacing: 0.05em;
  }

  .row-label-top {
    top: 3mm;
    left: 50%;
    transform: translateX(-50%);
  }

  .row-label-bottom {
    top: 50.5%;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Footer */
  .footer {
    height: 10mm;
    padding: 0 16mm 5mm 16mm;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .footer-left {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 7pt;
    color: #C5C0B8;
  }

  .footer-right {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 6.5pt;
    color: #C5C0B8;
    letter-spacing: 0.1em;
  }

</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="field">nome <span class="line"></span></div>
    <div class="field">data <span class="line"></span></div>
  </div>

  <!-- Grid 3x2 -->
  <div class="grid">

    <!-- Row 1: IO -->

    <!-- TRATTI - silhouette persona -->
    <div class="cell">
      <div class="cell-label">Tratti</div>
      <div class="cell-desc">chi sono</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="#C8C2BA" stroke-width="0.8"/><path d="M4.5 21c0-4.1 3.4-7.5 7.5-7.5s7.5 3.4 7.5 7.5" stroke="#C8C2BA" stroke-width="0.8" stroke-linecap="round"/></svg>
        <span class="dash"></span>
      </div>
    </div>

    <!-- FUOCHI - fiamma -->
    <div class="cell">
      <div class="cell-label">Fuochi</div>
      <div class="cell-desc">cosa mi accende</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2c0 4-4 6-4 10a4 4 0 0 0 8 0c0-4-4-6-4-10z" stroke="#C8C2BA" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 18c-1.1 0-2-.9-2-2 0-2 2-3 2-5 0 2 2 3 2 5 0 1.1-.9 2-2 2z" stroke="#C8C2BA" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dash"></span>
      </div>
    </div>

    <!-- SEGNI - cicatrice/fulmine -->
    <div class="cell">
      <div class="cell-label">Segni</div>
      <div class="cell-desc">cosa mi ha segnato</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4.5 13.5h6L9 22l9.5-12.5h-6L13 2z" stroke="#C8C2BA" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dash"></span>
      </div>
    </div>

    <!-- Row 2: IL MIO MONDO -->

    <!-- LEGAMI - due cerchi intrecciati -->
    <div class="cell">
      <div class="cell-label">Legami</div>
      <div class="cell-desc">chi cammina con me</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="12" r="5" stroke="#C8C2BA" stroke-width="0.8"/><circle cx="15" cy="12" r="5" stroke="#C8C2BA" stroke-width="0.8"/></svg>
        <span class="dash"></span>
      </div>
    </div>

    <!-- VALORI - diamante -->
    <div class="cell">
      <div class="cell-label">Valori</div>
      <div class="cell-desc">cosa non negozio</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3L3 12l9 9 9-9-9-9z" stroke="#C8C2BA" stroke-width="0.8" stroke-linejoin="round"/></svg>
        <span class="dash"></span>
      </div>
    </div>

    <!-- DIREZIONE - bussola -->
    <div class="cell">
      <div class="cell-label">Direzione</div>
      <div class="cell-desc">dove vado</div>
      <div class="cell-ornament">
        <span class="dash"></span>
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#C8C2BA" stroke-width="0.8"/><path d="M16.2 7.8l-2.1 6.3-6.3 2.1 2.1-6.3z" stroke="#C8C2BA" stroke-width="0.8" stroke-linejoin="round"/></svg>
        <span class="dash"></span>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">Mappa del Personaggio</div>
    <div class="footer-right">QUEST COACHING</div>
  </div>

</div>
</body>
</html>
